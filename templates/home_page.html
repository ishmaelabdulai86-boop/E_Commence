<script>
    // Get CSRF token
    function getCookie(name) {
        let cookieValue = null;
        if (document.cookie && document.cookie !== '') {
            const cookies = document.cookie.split(';');
            for (let i = 0; i < cookies.length; i++) {
                const cookie = cookies[i].trim();
                if (cookie.substring(0, name.length + 1) === (name + '=')) {
                    cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                    break;
                }
            }
        }
        return cookieValue;
    }
    
    // ==================== TOAST NOTIFICATION ====================
    function showToast(type, message) {
        const toastContainer = document.getElementById('toast-container') || createToastContainer();
        
        const toast = document.createElement('div');
        toast.className = `custom-toast ${type}`;
        
        let icon = '';
        let title = '';
        if (type === 'success') {
            icon = '<i class="fas fa-check-circle fa-lg" style="color: #10b981;"></i>';
            title = 'Success!';
        } else if (type === 'error') {
            icon = '<i class="fas fa-exclamation-triangle fa-lg" style="color: #ef4444;"></i>';
            title = 'Error!';
        } else if (type === 'warning') {
            icon = '<i class="fas fa-exclamation-circle fa-lg" style="color: #f59e0b;"></i>';
            title = 'Warning!';
        } else {
            icon = '<i class="fas fa-info-circle fa-lg" style="color: #3b82f6;"></i>';
            title = 'Information';
        }
        
        toast.innerHTML = `
            <div class="d-flex align-items-start p-3">
                <div class="flex-shrink-0 me-3">
                    ${icon}
                </div>
                <div class="flex-grow-1">
                    <div class="d-flex justify-content-between align-items-start mb-1">
                        <strong class="message-title" style="font-size: 0.9rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;">${title}</strong>
                        <button type="button" class="btn-close-custom" style="font-size: 0.7rem; padding: 0.5rem; background: none; border: none; cursor: pointer;">&times;</button>
                    </div>
                    <div class="message-content" style="line-height: 1.4; font-size: 0.9rem;">
                        ${message}
                    </div>
                    <div class="progress mt-2" style="height: 3px; background-color: rgba(0,0,0,0.1); border-radius: 3px; overflow: hidden;">
                        <div class="progress-bar" style="width: 100%; height: 100%; transition: width 5s linear; background: ${type === 'success' ? '#10b981' : type === 'error' ? '#ef4444' : type === 'warning' ? '#f59e0b' : '#3b82f6'};"></div>
                    </div>
                </div>
            </div>
        `;
        
        toastContainer.appendChild(toast);
        
        const progressBar = toast.querySelector('.progress-bar');
        setTimeout(() => {
            if (progressBar) progressBar.style.width = '0%';
        }, 100);
        
        const closeBtn = toast.querySelector('.btn-close-custom');
        closeBtn.addEventListener('click', () => {
            closeToast(toast);
        });
        
        setTimeout(() => {
            closeToast(toast);
        }, 5000);
    }
    
    function createToastContainer() {
        let container = document.getElementById('toast-container');
        if (!container) {
            container = document.createElement('div');
            container.id = 'toast-container';
            container.style.cssText = 'position: fixed; top: 90px; right: 20px; z-index: 9999; min-width: 350px; max-width: 500px;';
            document.body.appendChild(container);
        }
        return container;
    }
    
    function closeToast(toast) {
        toast.style.animation = 'slideOutRight 0.3s ease';
        setTimeout(() => {
            if (toast.parentNode) toast.remove();
        }, 300);
    }
    
    // ==================== QUANTITY SELECTOR (FIXED) ====================
    document.addEventListener('DOMContentLoaded', function() {
        const quantityInput = document.getElementById('quantity');
        const decreaseBtn = document.getElementById('decreaseQuantity');
        const increaseBtn = document.getElementById('increaseQuantity');
        
        if (quantityInput && decreaseBtn && increaseBtn) {
            const maxStock = parseInt(quantityInput.getAttribute('max')) || 999;
            
            // Store initial quantity
            let currentQuantity = parseInt(quantityInput.value) || 1;
            
            decreaseBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                let currentValue = parseInt(quantityInput.value);
                if (currentValue > 1) {
                    quantityInput.value = currentValue - 1;
                    // Trigger change event
                    quantityInput.dispatchEvent(new Event('change'));
                }
            });
            
            increaseBtn.addEventListener('click', function(e) {
                e.preventDefault();
                e.stopPropagation();
                let currentValue = parseInt(quantityInput.value);
                if (currentValue < maxStock) {
                    quantityInput.value = currentValue + 1;
                    // Trigger change event
                    quantityInput.dispatchEvent(new Event('change'));
                } else if (maxStock > 0) {
                    showToast('warning', `Only ${maxStock} items available in stock`);
                }
            });
            
            quantityInput.addEventListener('change', function() {
                let value = parseInt(this.value);
                if (isNaN(value) || value < 1) {
                    this.value = 1;
                } else if (value > maxStock) {
                    this.value = maxStock;
                    showToast('warning', `Only ${maxStock} items available in stock`);
                }
            });
        }
    });
    
    // ==================== CHANGE MAIN IMAGE ====================
    function changeImage(element, src) {
        const mainImage = document.getElementById('mainImage');
        if (mainImage) {
            mainImage.style.opacity = '0.5';
            setTimeout(() => {
                mainImage.src = src;
                mainImage.style.opacity = '1';
            }, 200);
        }
        
        document.querySelectorAll('.thumbnail').forEach(thumb => {
            thumb.classList.remove('active');
        });
        element.classList.add('active');
    }
    
    // ==================== TAB SWITCHING ====================
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', function() {
            const tabId = this.dataset.tab;
            
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            this.classList.add('active');
            const tabContent = document.getElementById(`tab-${tabId}`);
            if (tabContent) {
                tabContent.classList.add('active');
            }
        });
    });
    
    // ==================== RATING STARS INTERACTION (FIXED) ====================
    const ratingInputContainer = document.getElementById('ratingInput');
    if (ratingInputContainer) {
        const labels = ratingInputContainer.querySelectorAll('label');
        const radios = ratingInputContainer.querySelectorAll('input[type="radio"]');
        
        function updateStarsFromChecked() {
            const checked = ratingInputContainer.querySelector('input:checked');
            if (checked) {
                const ratingValue = parseInt(checked.value);
                labels.forEach((label, idx) => {
                    const starValue = 5 - idx;
                    const icon = label.querySelector('i');
                    if (starValue <= ratingValue) {
                        icon.className = 'fas fa-star';
                        label.style.color = '#fbbf24';
                    } else {
                        icon.className = 'far fa-star';
                        label.style.color = '#d1d5db';
                    }
                });
            } else {
                labels.forEach(label => {
                    const icon = label.querySelector('i');
                    icon.className = 'far fa-star';
                    label.style.color = '#d1d5db';
                });
            }
        }
        
        labels.forEach((label, index) => {
            label.addEventListener('click', function(e) {
                e.preventDefault();
                const radioId = this.getAttribute('for');
                const radio = document.getElementById(radioId);
                if (radio) {
                    radio.checked = true;
                    updateStarsFromChecked();
                }
            });
            
            label.addEventListener('mouseenter', function() {
                const ratingValue = parseInt(this.getAttribute('for').replace('star', ''));
                labels.forEach((lbl, i) => {
                    const starValue = 5 - i;
                    const icon = lbl.querySelector('i');
                    if (starValue <= ratingValue) {
                        icon.className = 'fas fa-star';
                        lbl.style.color = '#fbbf24';
                    } else {
                        icon.className = 'far fa-star';
                        lbl.style.color = '#d1d5db';
                    }
                });
            });
        });
        
        ratingInputContainer.addEventListener('mouseleave', function() {
            updateStarsFromChecked();
        });
        
        updateStarsFromChecked();
    }
    
    // ==================== ADD TO CART (FIXED) ====================
    document.querySelectorAll('.btn-add-cart').forEach(btn => {
        btn.addEventListener('click', async function(e) {
            e.preventDefault();
            
            const productId = this.dataset.productId;
            const quantityInput = document.getElementById('quantity');
            const quantity = quantityInput ? parseInt(quantityInput.value) : 1;
            const url = `/cart/add/${productId}/`;
            
            this.classList.add('btn-loading');
            this.disabled = true;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken'),
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: JSON.stringify({ quantity: quantity })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast('success', data.message || `${quantity} item(s) added to cart! 🎉`);
                    if (data.cart_count !== undefined) {
                        updateCartCount(data.cart_count);
                    }
                    // Optionally reset quantity to 1
                    if (quantityInput) {
                        quantityInput.value = 1;
                    }
                } else if (data.requires_auth) {
                    showToast('warning', 'Please login to add items to cart');
                    setTimeout(() => {
                        window.location.href = '/login/?next=' + window.location.pathname;
                    }, 1500);
                } else {
                    showToast('error', data.message || 'Failed to add to cart');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('error', 'Network error. Please try again.');
            } finally {
                this.classList.remove('btn-loading');
                this.disabled = false;
            }
        });
    });
    
    // ==================== BUY NOW ====================
    document.querySelectorAll('.btn-buy-now').forEach(btn => {
        btn.addEventListener('click', async function(e) {
            e.preventDefault();
            
            const productId = this.dataset.productId;
            const quantityInput = document.getElementById('quantity');
            const quantity = quantityInput ? parseInt(quantityInput.value) : 1;
            const url = `/cart/add/${productId}/`;
            
            this.classList.add('btn-loading');
            this.disabled = true;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken'),
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: JSON.stringify({ quantity: quantity, buy_now: true })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    window.location.href = '/checkout/';
                } else if (data.requires_auth) {
                    showToast('warning', 'Please login to use Buy Now');
                    setTimeout(() => {
                        window.location.href = '/login/?next=' + window.location.pathname;
                    }, 1500);
                } else {
                    showToast('error', data.message || 'Failed to proceed');
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('error', 'Network error. Please try again.');
            } finally {
                this.classList.remove('btn-loading');
                this.disabled = false;
            }
        });
    });
    
    // ==================== WISHLIST (FIXED) ====================
    document.querySelectorAll('.btn-wishlist').forEach(btn => {
        btn.addEventListener('click', async function(e) {
            e.preventDefault();
            
            const productId = this.dataset.productId;
            const url = `/wishlist/toggle/${productId}/`;
            const icon = this.querySelector('i');
            const span = this.querySelector('span');
            
            this.classList.add('btn-loading');
            this.disabled = true;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'X-CSRFToken': getCookie('csrftoken'),
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                
                const data = await response.json();
                
                if (data.success) {
                    if (data.action === 'added') {
                        icon.className = 'fas fa-heart';
                        span.textContent = 'Remove from Wishlist';
                        this.classList.add('in-wishlist');
                        showToast('success', 'Added to wishlist! ❤️');
                    } else {
                        icon.className = 'far fa-heart';
                        span.textContent = 'Add to Wishlist';
                        this.classList.remove('in-wishlist');
                        showToast('info', 'Removed from wishlist');
                    }
                } else {
                    if (data.message && data.message.includes('login')) {
                        showToast('warning', 'Please login to use wishlist');
                        setTimeout(() => {
                            window.location.href = '/login/?next=' + window.location.pathname;
                        }, 1500);
                    } else {
                        showToast('error', data.message || 'Failed to update wishlist');
                    }
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('error', 'Please login to use wishlist');
            } finally {
                this.classList.remove('btn-loading');
                this.disabled = false;
            }
        });
    });
    
    // ==================== REVIEW FORM HANDLING (FIXED) ====================
    const reviewForm = document.getElementById('reviewForm');
    if (reviewForm) {
        reviewForm.addEventListener('submit', function(e) {
            const ratingChecked = document.querySelector('input[name="rating"]:checked');
            if (!ratingChecked) {
                e.preventDefault();
                showToast('error', 'Please select a rating');
                return false;
            }
            
            const comment = document.getElementById('reviewComment');
            if (!comment.value.trim()) {
                e.preventDefault();
                showToast('error', 'Please write a review comment');
                return false;
            }
            
            // Show loading state
            const submitBtn = this.querySelector('button[type="submit"]');
            if (submitBtn) {
                submitBtn.classList.add('btn-loading');
                submitBtn.disabled = true;
            }
            
            return true;
        });
    }
    
    function updateCartCount(count) {
        document.querySelectorAll('.cart-count, #cart-count, .cart-item-count').forEach(el => {
            if (el) el.textContent = count;
        });
    }
</script>
