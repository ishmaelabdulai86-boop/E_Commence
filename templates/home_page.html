<!-- Review Modal -->
<div class="modal fade modal-modern" id="reviewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <div>
                    <h5 class="modal-title">Write a Review</h5>
                    <p class="mb-0" style="opacity: 0.8; font-size: 0.9rem;">Share your experience with {{ product.name|truncatechars:40 }}</p>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <form id="reviewForm" method="post" action="{% url 'products:add_review' product.id %}">
                {% csrf_token %}
                <div class="modal-body" style="padding: 2rem;">
                    <div class="mb-4">
                        <label class="form-label fw-bold">Your Rating *</label>
                        <div class="rating-input" id="ratingInput">
                            {% for i in "54321" %}
                            <input type="radio" name="rating" id="star{{ i }}" value="{{ i }}" style="display: none;" required>
                            <label for="star{{ i }}" class="star-label" data-value="{{ i }}" style="color: #d1d5db; font-size: 2rem; cursor: pointer;">
                                <i class="far fa-star"></i>
                            </label>
                            {% endfor %}
                        </div>
                        <div class="invalid-feedback" id="ratingError" style="display: none;">Please select a rating</div>
                    </div>
                    
                    <div class="mb-4">
                        <label for="reviewTitle" class="form-label fw-bold">Review Title</label>
                        <input type="text" name="title" id="reviewTitle" class="form-control" placeholder="Summarize your experience" style="border-radius: 12px; padding: 0.75rem; border: 1px solid var(--border);">
                    </div>
                    
                    <div class="mb-4">
                        <label for="reviewComment" class="form-label fw-bold">Your Review *</label>
                        <textarea name="comment" id="reviewComment" class="form-control" rows="5" placeholder="What did you like or dislike about this product?" required style="border-radius: 12px; padding: 0.75rem; border: 1px solid var(--border);"></textarea>
                        <div class="invalid-feedback" id="commentError" style="display: none;">Please write your review</div>
                    </div>
                    
                    <div>
                        <label class="form-label fw-bold">Would you recommend this product?</label>
                        <div class="d-flex gap-3 mt-2">
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="recommend" id="recommendYes" value="yes" checked>
                                <label class="form-check-label" for="recommendYes">Yes, I recommend</label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="recommend" id="recommendNo" value="no">
                                <label class="form-check-label" for="recommendNo">No, I don't recommend</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer" style="border-top: 1px solid var(--border); padding: 1rem 2rem;">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" style="border-radius: 12px;">Cancel</button>
                    <button type="submit" class="btn-add-cart" id="submitReviewBtn" style="margin: 0; padding: 0.75rem 1.5rem;">Submit Review</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script>
// Rating stars functionality
function initializeRatingStars() {
    const ratingContainer = document.getElementById('ratingInput');
    if (!ratingContainer) return;
    
    const starLabels = document.querySelectorAll('.star-label');
    
    function updateStars(ratingValue) {
        starLabels.forEach(label => {
            const icon = label.querySelector('i');
            const labelValue = parseInt(label.getAttribute('data-value'));
            
            if (labelValue <= ratingValue) {
                icon.className = 'fas fa-star';
                label.style.color = '#fbbf24';
            } else {
                icon.className = 'far fa-star';
                label.style.color = '#d1d5db';
            }
        });
    }
    
    starLabels.forEach(label => {
        label.addEventListener('mouseenter', function() {
            const ratingValue = parseInt(this.getAttribute('data-value'));
            updateStars(ratingValue);
        });
        
        label.addEventListener('click', function(e) {
            e.preventDefault();
            const ratingValue = parseInt(this.getAttribute('data-value'));
            const radioInput = document.getElementById(`star${ratingValue}`);
            if (radioInput) {
                radioInput.checked = true;
                updateStars(ratingValue);
                document.getElementById('ratingError').style.display = 'none';
            }
        });
    });
    
    ratingContainer.addEventListener('mouseleave', function() {
        const checkedRadio = document.querySelector('#ratingInput input[name="rating"]:checked');
        updateStars(checkedRadio ? parseInt(checkedRadio.value) : 0);
    });
    
    const checkedRadio = document.querySelector('#ratingInput input[name="rating"]:checked');
    if (checkedRadio) updateStars(parseInt(checkedRadio.value));
}

// Review form submission
function initializeReviewForm() {
    const reviewForm = document.getElementById('reviewForm');
    if (!reviewForm) return;
    
    reviewForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        document.getElementById('ratingError').style.display = 'none';
        document.getElementById('commentError').style.display = 'none';
        
        const selectedRating = document.querySelector('#ratingInput input[name="rating"]:checked');
        if (!selectedRating) {
            document.getElementById('ratingError').style.display = 'block';
            document.getElementById('ratingInput').scrollIntoView({ behavior: 'smooth', block: 'center' });
            return;
        }
        
        const comment = document.getElementById('reviewComment');
        if (!comment.value.trim()) {
            document.getElementById('commentError').style.display = 'block';
            comment.focus();
            return;
        }
        
        const submitBtn = document.getElementById('submitReviewBtn');
        const originalText = submitBtn.innerHTML;
        submitBtn.disabled = true;
        submitBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Submitting...';
        
        const formData = new FormData(reviewForm);
        
        try {
            const response = await fetch(reviewForm.action, {
                method: 'POST',
                body: formData,
                headers: { 'X-Requested-With': 'XMLHttpRequest' }
            });
            
            if (response.redirected) {
                window.location.href = response.url;
            } else if (response.ok) {
                const data = await response.json();
                if (data.success) {
                    showNotification('success', data.message || 'Review submitted successfully!');
                    const modal = bootstrap.Modal.getInstance(document.getElementById('reviewModal'));
                    if (modal) modal.hide();
                    reviewForm.reset();
                    document.querySelectorAll('#ratingInput input[name="rating"]').forEach(radio => radio.checked = false);
                    updateStars(0);
                    setTimeout(() => window.location.reload(), 1500);
                } else {
                    showNotification('error', data.error || 'Failed to submit review');
                    submitBtn.disabled = false;
                    submitBtn.innerHTML = originalText;
                }
            } else {
                const errorData = await response.json();
                showNotification('error', errorData.error || 'Failed to submit review');
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalText;
            }
        } catch (error) {
            console.error('Error:', error);
            showNotification('error', 'Network error. Please try again.');
            submitBtn.disabled = false;
            submitBtn.innerHTML = originalText;
        }
    });
}

// Helper function for updateStars (needed for reset)
function updateStars(ratingValue) {
    const starLabels = document.querySelectorAll('.star-label');
    starLabels.forEach(label => {
        const icon = label.querySelector('i');
        const labelValue = parseInt(label.getAttribute('data-value'));
        if (labelValue <= ratingValue) {
            icon.className = 'fas fa-star';
            label.style.color = '#fbbf24';
        } else {
            icon.className = 'far fa-star';
            label.style.color = '#d1d5db';
        }
    });
}

// Initialize when DOM is ready
document.addEventListener('DOMContentLoaded', function() {
    initializeRatingStars();
    initializeReviewForm();
});
</script>
