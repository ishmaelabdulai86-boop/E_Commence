<!-- templates/users/password_reset_complete.html -->
{% extends 'base.html' %}

{% block title %}Password Reset Complete - TechStore{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-body p-5 text-center">
                    <div class="mb-4">
                        <div class="success-checkmark">
                            <div class="check-icon">
                                <span class="icon-line line-tip"></span>
                                <span class="icon-line line-long"></span>
                                <div class="icon-circle"></div>
                                <div class="icon-fix"></div>
                            </div>
                        </div>
                    </div>
                    
                    <h2 class="mb-3">Password Reset Complete!</h2>
                    
                    <p class="text-muted mb-4">
                        Your password has been successfully reset. 
                        You can now log in with your new password.
                    </p>
                    
                    <div class="d-grid">
                        <a href="{% url 'users:login' %}" class="btn btn-primary-custom btn-lg">
                            <i class="fas fa-sign-in-alt me-2"></i>Log In Now
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .success-checkmark {
        width: 80px;
        height: 115px;
        margin: 0 auto;
    }
    
    .check-icon {
        width: 80px;
        height: 80px;
        position: relative;
        border-radius: 50%;
        box-sizing: content-box;
        border: 4px solid #4CAF50;
    }
    
    .icon-line {
        height: 5px;
        background-color: #4CAF50;
        display: block;
        border-radius: 2px;
        position: absolute;
        z-index: 10;
    }
    
    .line-tip {
        top: 46px;
        left: 14px;
        width: 25px;
        transform: rotate(45deg);
    }
    
    .line-long {
        top: 38px;
        right: 8px;
        width: 47px;
        transform: rotate(-45deg);
    }
</style>
{% endblock %}
